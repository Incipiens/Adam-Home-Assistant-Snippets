sensor:
  - platform: homeassistant
    id: ha_print_progress
    entity_id: sensor.${printer}_print_progress
    on_value:
      then:
        - lvgl.arc.update:
            id: arc_progress
            value: !lambda 'return (int)x;'
        - lvgl.label.update:
            id: lbl_progress_pct
            text: !lambda |-
              char buf[8]; snprintf(buf, sizeof(buf), "%d%%", (int)x);
              return std::string(buf);
        - lvgl.bar.update:
            id: bar_progress
            value: !lambda 'return (int)x;'

  - platform: homeassistant
    id: ha_nozzle_temp
    entity_id: sensor.${printer}_nozzle_temperature
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_nozzle_temp
            text: !lambda |-
              char buf[16]; snprintf(buf, sizeof(buf), "%.0f°C", x);
              return std::string(buf);

  - platform: homeassistant
    id: ha_nozzle_target
    entity_id: sensor.${printer}_nozzle_target_temperature
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_nozzle_target
            text: !lambda |-
              if ((int)x == 0) return std::string("Off");
              char buf[16]; snprintf(buf, sizeof(buf), "/ %.0f°C", x);
              return std::string(buf);

  - platform: homeassistant
    id: ha_bed_temp
    entity_id: sensor.${printer}_bed_temperature
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_bed_temp
            text: !lambda |-
              char buf[16]; snprintf(buf, sizeof(buf), "%.0f°C", x);
              return std::string(buf);

  - platform: homeassistant
    id: ha_bed_target
    entity_id: sensor.${printer}_bed_target_temperature
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_bed_target
            text: !lambda |-
              if ((int)x == 0) return std::string("Off");
              char buf[16]; snprintf(buf, sizeof(buf), "/ %.0f°C", x);
              return std::string(buf);

  - platform: homeassistant
    id: ha_chamber_temp
    entity_id: sensor.${printer}_chamber_temperature
    on_value:
      then:
        - lvgl.label.update:
