substitutions:
  device_name: bambu-watch
  friendly_name: Bambu Watch
  # Change this to your Bambu Lab printer's entity prefix
  # Find it in HA settings
  printer: (printer entity))

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: INFO

api:
  encryption:
    key: "XX"

ota:
  - platform: esphome
    password: "XX"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: "XX"

captive_portal:

# Display

spi:
  - id: tft
    clk_pin: 14
    mosi_pin: 13
    miso_pin:
      number: 12
      ignore_strapping_warning: true
  - id: touch
    clk_pin: 25
    mosi_pin: 32
    miso_pin: 39

output:
  - id: backlight_pwm
    platform: ledc
    pin: 21

light:
  - id: backlight
    platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    restore_mode: ALWAYS_ON

display:
  - id: main_display
    platform: ili9xxx
    model: ILI9341
    spi_id: tft
    cs_pin:
      number: 15
      ignore_strapping_warning: true
    dc_pin:
      number: 2
      ignore_strapping_warning: true
    invert_colors: false
    update_interval: never
    auto_clear_enabled: false
    dimensions:
      height: 240
      width: 320
    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: false

touchscreen:
  - id: main_touchscreen
    platform: xpt2046
    spi_id: touch
    cs_pin: 33
    interrupt_pin: 36
    threshold: 400
    calibration:
      x_min: 360
      x_max: 3860
      y_min: 280
      y_max: 3860
    transform:
      swap_xy: true
      mirror_x: false
    on_touch:
      - light.turn_on:
          id: backlight
          brightness: 100%
          transition_length: 0.5s

