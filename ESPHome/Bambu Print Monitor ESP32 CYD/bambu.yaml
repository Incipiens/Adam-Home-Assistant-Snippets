binary_sensor:
  - platform: homeassistant
    id: ha_online
    entity_id: binary_sensor.${printer}_online
    on_state:
      then:
        - if:
            condition:
              lambda: 'return x;'
            then:
              - lvgl.label.update:
                  id: lbl_online_status
                  text: "Online"
              - lvgl.widget.update:
                  id: lbl_online_status
                  text_color: 0x00E676
            else:
              - lvgl.label.update:
                  id: lbl_online_status
                  text: "Offline"
              - lvgl.widget.update:
                  id: lbl_online_status
                  text_color: 0xFF5252
  - platform: homeassistant
    id: ha_door
    entity_id: binary_sensor.${printer}_enclosure_door
    on_state:
      then:
        - if:
            condition:
              lambda: 'return x;'
            then:
              - lvgl.label.update:
                  id: lbl_door
                  text: "Open"
            else:
              - lvgl.label.update:
                  id: lbl_door
                  text: "Closed"
  - platform: homeassistant
    id: ha_hms_errors
    entity_id: binary_sensor.${printer}_hms_errors
    on_state:
      then:
        - if:
            condition:
              lambda: 'return x;'
            then:
              - lvgl.label.update:
                  id: lbl_hms
                  text: "ERRORS"
              - lvgl.widget.update:
                  id: lbl_hms
                  text_color: 0xFF5252
            else:
              - lvgl.label.update:
                  id: lbl_hms
                  text: "Clear"
              - lvgl.widget.update:
                  id: lbl_hms
                  text_color: 0x00E676
  - platform: homeassistant
    id: ha_filament
    entity_id: binary_sensor.${printer}_extruder_filament_state

# LVGL

lvgl:
  buffer_size: 25%
  log_level: WARN
  color_depth: 16
  touchscreens:
    - main_touchscreen
  displays:
    - main_display

  theme:
    label:
      text_font: roboto_14
      text_color: 0xE0E0E0
    obj:
      bg_color: 0x1A1A2E
      border_width: 0
      radius: 4
    arc:
      arc_color: 0x333355
      arc_width: 7
      indicator:
        arc_color: 0x00E676
        arc_width: 7
      knob:
        bg_opa: TRANSP
    bar:
      bg_color: 0x333355
      bg_opa: COVER
      radius: 3
      indicator:
        bg_color: 0x00E676
        radius: 3
    buttonmatrix:
      bg_opa: TRANSP
      border_width: 0
      pad_all: 0
      items:
        bg_color: 0x16213E
        bg_opa: COVER
        border_color: 0x0F3460
        border_width: 1
        text_color: 0x7878A0
        text_font: mdi_18
        pressed:
          bg_color: 0x0F3460
          text_color: 0x00E676

  style_definitions:
    - id: style_card
      bg_color: 0x16213E
      bg_opa: COVER
      radius: 6
      border_width: 1
      border_color: 0x0F3460
      pad_all: 4
      scrollbar_mode: "OFF"
    - id: style_nav
      bg_color: 0x0A0A1A
      bg_opa: COVER
      border_width: 0

  pages:

    # Status
    - id: page_status
      scrollbar_mode: "OFF"
      bg_color: 0x0A0A1A
      widgets:
        - obj:
            scrollbar_mode: "OFF"
            width: 320
            height: 22
            x: 0
            y: 0
            bg_color: 0x16213E
            bg_opa: COVER
            radius: 0
            pad_left: 6
            pad_right: 6
            pad_top: 3
            widgets:
              - label:
                  text: "\U000F0A7A Bambu P2S"
                  text_font: roboto_14
                  text_color: 0x00E676
                  align: LEFT_MID
              - label:
                  id: lbl_online_status
                  text: "..."
                  text_font: roboto_14
                  text_color: 0x7878A0
                  align: RIGHT_MID
        - arc:
            id: arc_progress
            x: 8
            y: 28
            width: 88
            height: 88
            min_value: 0
            max_value: 100
            value: 0
            adjustable: false
            start_angle: 135
            end_angle: 45
            indicator:
              arc_color: 0x00E676
              arc_width: 7
              arc_rounded: true
            arc_color: 0x333355
            arc_width: 7
            widgets:
              - label:
                  id: lbl_progress_pct
                  text: "--%"
                  text_font: roboto_bold_20
                  text_color: 0xFFFFFF
                  align: CENTER
        - label:
            id: lbl_print_status
            text: "..."
            text_font: roboto_bold_20
            text_color: 0xB0B0CC
            x: 106
            y: 28
        - label:
