  top_layer:
    widgets:
      - buttonmatrix:
          align: BOTTOM_MID
          width: 320
          height: 32
          styles: style_nav
          pad_all: 0
          outline_width: 0
          items:
            bg_color: 0x16213E
            bg_opa: COVER
            border_color: 0x0F3460
            border_width: 1
            text_color: 0x7878A0
            text_font: mdi_18
            pressed:
              bg_color: 0x0F3460
              text_color: 0x00E676
          rows:
            - buttons:
                - id: nav_status
                  text: "\U000F0A7A"
                  on_press:
                    then:
                      - lvgl.page.show:
                          id: page_status
                          animation: FADE_IN
                          time: 200ms
                - id: nav_temps
                  text: "\U000F050F"
                  on_press:
                    then:
                      - lvgl.page.show:
                          id: page_temps
                          animation: FADE_IN
                          time: 200ms
                - id: nav_ams
                  text: "\U000F0493"
                  on_press:
                    then:
                      - lvgl.page.show:
                          id: page_ams
                          animation: FADE_IN
                          time: 200ms
                - id: nav_info
                  text: "\U000F02DC"
                  on_press:
                    then:
                      - lvgl.page.show:
                          id: page_info
                          animation: FADE_IN
                          time: 200ms

  on_idle:
    - timeout: 60s
      then:
        - light.turn_on:
            id: backlight
            brightness: 30%
            transition_length: 1s
    - timeout: 300s
      then:
        - light.turn_off:
            id: backlight
            transition_length: 2s