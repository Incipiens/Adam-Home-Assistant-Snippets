            text: !lambda |-
              char buf[16]; snprintf(buf, sizeof(buf), "%.0f°C", x);
              return std::string(buf);

  - platform: homeassistant
    id: ha_remaining_time
    entity_id: sensor.${printer}_remaining_time
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_remaining_time
            text: !lambda |-
              int mins = (int)x;
              if (mins <= 0) return std::string("Done");
              int h = mins / 60; int m = mins % 60;
              char buf[16];
              if (h > 0) snprintf(buf, sizeof(buf), "%dh %dm", h, m);
              else snprintf(buf, sizeof(buf), "%dm", m);
              return std::string(buf);

  - platform: homeassistant
    id: ha_current_layer
    entity_id: sensor.${printer}_current_layer
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_layers
            text: !lambda |-
              char buf[24];
              snprintf(buf, sizeof(buf), "%d/%d", (int)id(ha_current_layer).state, (int)id(ha_total_layers).state);
              return std::string(buf);
  - platform: homeassistant
