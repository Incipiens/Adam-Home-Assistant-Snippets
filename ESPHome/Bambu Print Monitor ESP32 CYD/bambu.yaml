# HA sensors

text_sensor:
  - platform: homeassistant
    id: ha_print_status
    entity_id: sensor.${printer}_print_status
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_print_status
            text: !lambda |-
              std::string s = x;
              if (s == "finish") return std::string("Finished");
              if (s == "running") return std::string("Printing");
              if (s == "pause") return std::string("Paused");
              if (s == "idle") return std::string("Idle");
              if (s == "prepare") return std::string("Preparing");
              if (s == "failed") return std::string("Failed");
              return std::string(x);
        - lvgl.label.update:
            id: lbl_status_detail
            text: !lambda |-
              std::string s = x;
              if (s == "finish") return std::string("Finished");
              if (s == "running") return std::string("Printing");
              if (s == "pause") return std::string("Paused");
              if (s == "idle") return std::string("Idle");
              if (s == "prepare") return std::string("Preparing");
              if (s == "failed") return std::string("Failed");
              return std::string(x);

  - platform: homeassistant
    id: ha_current_stage
    entity_id: sensor.${printer}_current_stage
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_current_stage
            text: !lambda |-
              std::string s = x;
              if (s == "idle") return std::string("Idle");
              if (s == "printing") return std::string("Printing");
              if (s == "auto_bed_leveling") return std::string("Bed Leveling");
              if (s == "heatbed_preheating") return std::string("Heating Bed");
              if (s == "sweeping_xp_area") return std::string("Sweeping");
              if (s == "changing_filament") return std::string("Filament Change");
              if (s == "heating_hotend") return std::string("Heating Nozzle");
              if (s == "calibrating_extrusion") return std::string("Calibrating");
              if (s == "scanning_bed_surface") return std::string("Scanning Bed");
              if (s == "inspecting_first_layer") return std::string("1st Layer Check");
              if (s == "cleaning_nozzle_tip") return std::string("Cleaning Nozzle");
              return std::string(x);

  - platform: homeassistant
    id: ha_task_name
    entity_id: sensor.${printer}_task_name
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_task_name
            text: !lambda 'return std::string(x);'

  - platform: homeassistant
    id: ha_speed_profile
    entity_id: sensor.${printer}_speed_profile
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_speed_profile
            text: !lambda |-
              std::string s = x;
              if (s == "silent") return std::string("Silent");
              if (s == "standard") return std::string("Standard");
              if (s == "sport") return std::string("Sport");
              if (s == "ludicrous") return std::string("Ludicrous");
              return std::string(x);
        - lvgl.label.update:
            id: lbl_speed_profile2
            text: !lambda |-
              std::string s = x;
              if (s == "silent") return std::string("Silent");
              if (s == "standard") return std::string("Standard");
              if (s == "sport") return std::string("Sport");
              if (s == "ludicrous") return std::string("Ludicrous");
              return std::string(x);

  - platform: homeassistant
    id: ha_active_tray
    entity_id: sensor.${printer}_active_tray
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_active_tray
            text: !lambda 'return std::string(x);'
        - lvgl.label.update:
            id: lbl_info_active_tray
            text: !lambda 'return std::string(x);'

  - platform: homeassistant
    id: ha_nozzle_type
    entity_id: sensor.${printer}_nozzle_type
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_nozzle_type
            text: !lambda |-
              std::string s = x;
              if (s == "hardened_steel") return std::string("Hardened Steel");
              if (s == "stainless_steel") return std::string("Stainless Steel");
              return std::string(x);
        - lvgl.label.update:
            id: lbl_info_nozzle_type
            text: !lambda |-
              std::string s = x;
              if (s == "hardened_steel") return std::string("Hardened Steel");
              if (s == "stainless_steel") return std::string("Stainless Steel");
              return std::string(x);

  - platform: homeassistant
    id: ha_ams1_tray1
    entity_id: sensor.${printer}_ams_1_tray_1
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_ams_tray1
            text: !lambda 'return std::string(x);'
  - platform: homeassistant
    id: ha_ams1_tray2
    entity_id: sensor.${printer}_ams_1_tray_2
    on_value:
      then:
        - lvgl.label.update:
